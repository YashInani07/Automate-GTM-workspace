# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# sys.path path, separated by systems path separator.
# This path is prepended to sys.path when env.py is run.
prepend_syspath = .

# database URL used for migrations
sqlalchemy.url = postgresql+psycopg2://postgres:postgres@db:5432/postgres

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
