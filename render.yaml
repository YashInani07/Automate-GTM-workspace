databases:
  # 1. Managed PostgreSQL Database
  - name: gtm-db
    plan: free

services:
  # 2. Managed Redis
  - type: redis
    name: gtm-redis
    plan: free
    ipAllowList: [] # Secures Redis internally inside Render's private network

  # 3. FastAPI Web Service
  - type: web
    name: gtm-web
    env: docker
    plan: free
    envVars:
      - key: PROJECT_NAME
        value: "GTM Automated Workflow"
      - key: DATABASE_URL
        fromDatabase:
          name: gtm-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: gtm-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: gtm-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: gtm-redis
          property: connectionString
      - key: JINA_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ZAPIER_WEBHOOK_URL
        sync: false
      - key: CRM_WEBHOOK_URL
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: IMAP_HOST
        value: "imap.gmail.com"
      - key: IMAP_PORT
        value: "993"
      - key: IMAP_USER
        sync: false
      - key: IMAP_PASSWORD
        sync: false
      - key: LOG_LEVEL
        value: "INFO"
      - key: REPLY_POLL_INTERVAL_MINUTES
        value: "5"


